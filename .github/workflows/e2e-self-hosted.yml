name: E2E (self-hosted)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e-self-hosted.yml"

jobs:
  e2e-full:
    if: vars.ENABLE_SELF_HOSTED_E2E == 'true'
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full E2E suite
        env:
          EXPANDO_E2E_FULL: "1"
        run: pytest -q tests/e2e -ra