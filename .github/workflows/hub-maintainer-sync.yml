name: Hub maintainer sync

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  validate-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Hub portal sync validate (dry-run)
        env:
          EXPANDO_HUB_MARKETPLACE_DISABLE: "1"
        run: |
          expando hub-portal sync --dry-run
          echo "Dry-run complete. Configure marketplace credentials to enable live sync."

      - name: Document maintainer sync
        run: |
          echo "Weekly maintainer sync validates remote marketplace index changes."
          echo "See docs/HUB_MARKETPLACE.md for publishing credentials and live sync."