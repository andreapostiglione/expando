name: E2E (self-hosted)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e-self-hosted.yml"

jobs:
  e2e-full:
    if: vars.ENABLE_SELF_HOSTED_E2E == 'true'
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v7

      # setup-python@v6 hardcodes /Users/runner on macOS; use system/brew Python instead.
      - name: Setup Python
        run: |
          python3 -c 'import sys; assert sys.version_info >= (3, 10), f"need Python 3.10+, got {sys.version}"'
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/python --version
          .venv/bin/pip --version

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check clipboard E2E readiness
        run: |
          .venv/bin/expando doctor || true
          .venv/bin/python - <<'PY'
          from expando.permissions import clipboard_injection_ready
          ready = clipboard_injection_ready()
          print(f"clipboard_injection_ready={ready!r}")
          PY

      - name: Run full E2E suite
        id: e2e
        env:
          EXPANDO_E2E_FULL: "1"
          EXPANDO_E2E_TEXTEDIT: "1"
          EXPANDO_E2E_CLIPBOARD: "1"
          EXPANDO_E2E_IMAGE: "1"
        run: pytest -q tests/e2e -ra --junitxml=e2e-results.xml

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit
          path: e2e-results.xml
          if-no-files-found: ignore

  e2e-skipped:
    if: vars.ENABLE_SELF_HOSTED_E2E != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Self-hosted E2E disabled
        run: |
          echo "Set repository variable ENABLE_SELF_HOSTED_E2E=true to run macOS E2E on a self-hosted runner."
          echo "See docs/E2E_SELF_HOSTED.md for setup."
