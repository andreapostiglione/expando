name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -q tests --ignore=tests/e2e
      - name: Validate community hub packages
        run: expando hub validate-community
      - name: Validate community trigger dashboard HTML
        run: expando hub validate-community --html -o /tmp/hub-trigger-suggestions.html
      - name: Export community validation JSON
        run: expando hub validate-community --json > /tmp/community-validation.json
      - name: Smoke test doctor full HTML dashboard
        run: expando doctor --full-html --full-html-output /tmp/doctor-health.html
      - name: Smoke test publish-site health export
        run: |
          expando hub portal publish-site
          test -f docs/doctor-health.html
          test -f docs/hub/doctor-full.json
          grep -Fq "Expando Health Dashboard" docs/doctor-health.html
          test -f docs/hub/index.json
          python -c "import json; d=json.load(open('docs/hub/index.json')); assert d['artifacts']"
      - name: Run E2E tests (headless-safe)
        run: pytest -q tests/e2e -m "not clipboard and not image and not integration"