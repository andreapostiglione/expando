name: E2E nightly (redundant runner)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  e2e-nightly-primary:
    if: vars.ENABLE_SELF_HOSTED_E2E == 'true'
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        run: |
          python3 -c 'import sys; assert sys.version_info >= (3, 10), f"need Python 3.10+, got {sys.version}"'
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install -e ".[dev]"

      - name: Run nightly E2E suite
        env:
          EXPANDO_E2E_FULL: "1"
          EXPANDO_E2E_CLIPBOARD: "1"
        run: pytest -q tests/e2e -ra --junitxml=e2e-nightly.xml

      - name: Upload nightly results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nightly-junit
          path: e2e-nightly.xml
          if-no-files-found: ignore

  e2e-nightly-skipped:
    if: vars.ENABLE_SELF_HOSTED_E2E != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Nightly E2E disabled
        run: |
          echo "Set ENABLE_SELF_HOSTED_E2E=true to run nightly macOS E2E."
          echo "See docs/E2E_RUNNERS.md for redundant runner failover."