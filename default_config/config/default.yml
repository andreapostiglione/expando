# Expando configuration

toggle_key: ALT
backend: auto
auto_restart: true
clipboard_threshold: 100
max_regex_buffer_size: 30
enabled: true
search_shortcut: CMD+SHIFT+E

# Disable Expando completely in these apps (password managers, games, etc.)
# app_blacklist:
#   - 1Password
#   - Bitwarden

# Restrict shell vars to allowed executables (empty = deny all shell commands)
shell_allowlist:
  - echo
  - git

# Toast when expansion is blocked (secure input, app rules, shell deny)
notify_on_block: true
notify_cooldown_seconds: 30

# Log verbosity: DEBUG, INFO, WARNING, ERROR (or EXPANDO_LOG_LEVEL env)
log_level: INFO

# Local expansion counters (opt-in; enable recording with `expando stats --enable`)
# track_expansions: false

# Sparkle-compatible update feed (checked once per day from menu bar)
check_updates: true
# update_feed_url: https://raw.githubusercontent.com/andreapostiglione/expando/main/appcast.xml

# Plugin allowlist (empty = load all plugins/*.py; otherwise only listed modules)
# plugins_allowlist:
#   - example.py

# Scheduled auto-backup on daemon start: off | daily | weekly
auto_backup: weekly
auto_backup_retention: 7
auto_backup_stale_days: 14