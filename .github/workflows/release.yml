name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE_BASE64" ]]; then
            echo "APPLE_CERTIFICATE_BASE64 not set — skipping cert import"
            exit 0
          fi
          KEYCHAIN=$RUNNER_TEMP/app-signing.keychain-db
          PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$PASSWORD" "$KEYCHAIN"

      - name: Build signed DMG
        env:
          EXPANDO_DISTRIBUTION: "1"
          EXPANDO_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          chmod +x scripts/*.sh
          if [[ -n "$APPLE_CERTIFICATE_BASE64" ]]; then
            export EXPANDO_SIGN=1
          else
            export EXPANDO_SIGN=0
          fi
          if [[ -n "$NOTARY_APPLE_ID" && -n "$NOTARY_PASSWORD" ]] || [[ -n "$NOTARY_API_KEY" ]]; then
            export EXPANDO_NOTARIZE=1
          else
            export EXPANDO_NOTARIZE=0
            if [[ -n "$NOTARY_APPLE_ID" && -z "$NOTARY_PASSWORD" ]]; then
              echo "NOTARY_APPLE_ID is set but NOTARY_PASSWORD is empty — building signed DMG only." >&2
            fi
          fi
          ./scripts/build-dmg.sh

      - name: Notarization audit
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q -e .
          STRICT=0
          if [[ -n "${{ secrets.NOTARY_APPLE_ID }}" && -n "${{ secrets.NOTARY_PASSWORD }}" ]] || [[ -n "${{ secrets.NOTARY_API_KEY }}" ]]; then
            STRICT=1
          fi
          if [[ "$STRICT" == "1" ]]; then
            .venv/bin/expando notarize-audit --app Expando.app --dmg Expando.dmg --strict -o notarize-audit.json --record --svg-path notarize-audit-trend.svg
          else
            .venv/bin/expando notarize-audit --app Expando.app --dmg Expando.dmg -o notarize-audit.json --record --svg-path notarize-audit-trend.svg
          fi

      - name: Sparkle helper smoke test
        run: .venv/bin/expando sparkle-smoke --app Expando.app

      - name: Sparkle helper benchmark
        env:
          EXPANDO_SPARKLE_HELPER_WARN_MS: "15000"
          EXPANDO_SPARKLE_HELPER_FAIL_MS: "30000"
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WARN_MS="${EXPANDO_SPARKLE_HELPER_WARN_MS:-15000}"
          FAIL_MS="${EXPANDO_SPARKLE_HELPER_FAIL_MS:-30000}"
          .venv/bin/expando sparkle-benchmark-history record \
            --version "$TAG" \
            --tag "${GITHUB_REF_NAME}" \
            --sparkle-warn-ms "$WARN_MS" \
            --sparkle-fail-ms "$FAIL_MS" \
            --svg | tee sparkle-benchmark.txt
          if grep -Fq "SPARKLE_HELPER_SLOW" sparkle-benchmark.txt; then
            echo "::warning title=Sparkle helper slow::Helper update check exceeded ${WARN_MS} ms (see sparkle-benchmark artifact)"
          fi
          if grep -Fq "SPARKLE_HELPER_FAIL" sparkle-benchmark.txt; then
            if [[ "${EXPANDO_SPARKLE_HELPER_STRICT:-0}" == "1" ]]; then
              echo "::error title=Sparkle helper fail::Helper update check exceeded ${FAIL_MS} ms (EXPANDO_SPARKLE_HELPER_STRICT=1)"
              exit 1
            fi
            echo "::warning title=Sparkle helper fail threshold::Helper update check exceeded ${FAIL_MS} ms (see sparkle-benchmark artifact)"
          fi
          .venv/bin/expando doctor --full-output doctor-full.json --full-html-output doctor-health.html
          .venv/bin/expando hub validate-community --json > community-validation.json

      - name: Upload release health bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-health-${{ github.ref_name }}
          path: |
            notarize-audit.json
            notarize-audit-trend.svg
            doctor-full.json
            doctor-health.html
            community-validation.json
            sparkle-benchmark.txt
            sparkle-benchmark-history.json
            sparkle-benchmark-trend.svg
          if-no-files-found: ignore

      - name: Update Sparkle benchmark history on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp sparkle-benchmark-history.json /tmp/sparkle-benchmark-history-release.json
          git checkout -- sparkle-benchmark-history.json
          git fetch origin main
          git switch -C main origin/main
          cp /tmp/sparkle-benchmark-history-release.json sparkle-benchmark-history.json
          git add sparkle-benchmark-history.json
          git diff --staged --quiet || git commit -m "chore: update sparkle benchmark history for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Sync release health docs to main
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp doctor-health.html /tmp/doctor-health-release.html
          cp doctor-full.json /tmp/doctor-full-release.json
          git fetch origin main
          git switch -C main origin/main
          mkdir -p docs/hub
          RELEASE_TAG="$RELEASE_TAG" .venv/bin/python - <<'PY'
          import json
          import os
          from pathlib import Path

          from expando.doctor_checks import (
              annotate_release_health_document,
              build_doctor_full_html,
          )

          release_tag = os.environ["RELEASE_TAG"]
          document = json.loads(
              Path("/tmp/doctor-full-release.json").read_text(encoding="utf-8")
          )
          annotated = annotate_release_health_document(document, release_tag=release_tag)
          Path("docs/hub/doctor-full.json").write_text(
              json.dumps(annotated, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          Path("docs/doctor-health.html").write_text(
              build_doctor_full_html(annotated),
              encoding="utf-8",
          )
          PY
          EXPANDO_PUBLISH_SITE_SKIP_HEALTH=1 .venv/bin/expando hub portal publish-site
          git add docs/
          git diff --staged --quiet || git commit -m "chore: sync release health docs for ${RELEASE_TAG}"
          git push origin HEAD:main

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          chmod +x scripts/generate-appcast.sh
          TAG="${GITHUB_REF_NAME#v}"
          ./scripts/generate-appcast.sh "$TAG" Expando.dmg appcast.xml

      - name: Generate Homebrew cask bump snippet
        run: |
          chmod +x scripts/bump-homebrew-cask.sh
          ./scripts/bump-homebrew-cask.sh Expando.dmg > homebrew-cask-bump.rb
          shasum -a 256 Expando.dmg | tee homebrew-cask-sha256.txt

      - name: Attach DMG and appcast to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Expando.dmg
            appcast.xml
            homebrew-cask-bump.rb
            homebrew-cask-sha256.txt
          generate_release_notes: true

      - name: Open Homebrew tap PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/push-homebrew-tap-pr.sh
          ./scripts/push-homebrew-tap-pr.sh Expando.dmg

      - name: Update appcast on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp appcast.xml /tmp/appcast-release.xml
          git checkout -- appcast.xml
          git fetch origin main
          git switch -C main origin/main
          cp /tmp/appcast-release.xml appcast.xml
          git add appcast.xml
          git diff --staged --quiet || git commit -m "chore: update appcast for ${GITHUB_REF_NAME}"
          git push origin HEAD:main