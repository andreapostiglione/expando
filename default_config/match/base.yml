matches:
  - trigger: ":hello"
    replace: "Hi there!"

  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%d/%m/%Y"

  - trigger: ":now"
    replace: "{{ts}}"
    vars:
      - name: ts
        type: date
        params:
          format: "%H:%M"
