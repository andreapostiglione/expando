name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -q tests --ignore=tests/e2e
      - name: Validate community hub packages
        run: expando hub validate-community
      - name: Validate community trigger dashboard HTML
        run: expando hub validate-community --html -o /tmp/hub-trigger-suggestions.html
      - name: Smoke test doctor full HTML dashboard
        run: expando doctor --full-html --full-html-output /tmp/doctor-health.html
      - name: Run E2E tests (headless-safe)
        run: pytest -q tests/e2e -m "not clipboard and not image and not integration"